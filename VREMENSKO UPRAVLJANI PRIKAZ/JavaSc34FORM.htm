<HTML><HEAD><TITLE>Vremenska petlja</TITLE><SCRIPT LANGUAGE="JavaScript">var vrijeme;function promjena(){var broj=window.document.mojaforma.tekst.value;broj=parseInt(broj)+1;window.document.mojaforma.tekst.value=broj;vrijeme=setTimeout("promjena();",1000);}</SCRIPT></HEAD>  <BODY ><FORM name="mojaforma"><input type="text" name="tekst" value=0><BR><input type="button" value="startaj vrijeme" onClick="promjena();"><input type="button" value="zaustavi vrijeme" onClick="clearTimeout(vrijeme); "></FORM></BODY></HTML>
