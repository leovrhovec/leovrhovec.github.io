<html lang="hr">
<head>
    <meta charset="UTF-8">
    <title>Zadatak 14</title>
    <style>
        button {
            padding: 5px 10px;
            margin-right: 5px;
            cursor: pointer;
        }

        .box {
            position: absolute;
            box-shadow: 2px 2px 10px rgba(0, 0, 0, 0.4);
        }

        #div1 {
            width: 200px;
            height: 200px;
            background-image: url('1.jpg');
            background-size: cover;
            top: 100px;
            left: 100px;
            z-index: 1;
        }

        #div2 {
            width: 200px;
            height: 200px;
            background-image: url('2.jpg');
            background-size: cover;
            top: 150px;
            left: 150px;
            z-index: 2;
        }

        #div3 {
            width: 200px;
            height: 200px;
            background-image: url('3.jpg');
            background-size: cover;
            top: 200px;
            left: 200px;
            z-index: 3;
        }

        #div4 {
            width: 200px;
            height: 200px;
            background-image: url('4.jpg');
            background-size: cover;
            top: 300px;
            left: 350px;
            z-index: 4;
        }

        #div5 {
            width: 200px;
            height: 200px;
            background-image: url('5.jpeg');
            background-size: cover;
            top: 350px;
            left: 300px;
            z-index: 5;
        }

        #div6 {
            width: 350px;
            height: 200px;
            background-color: gray;
            top: 250px;
            left: 0px;
            z-index: 6;
        }

        .box:hover {
            z-index: 100;
        }
    </style>
</head>
<body>

    <button onclick="pomakni(-20)">u lijevo</button>
    <button onclick="pomakni(20)">u desno</button>

    <div id="div1" class="box"></div>
    <div id="div2" class="box"></div>
    <div id="div3" class="box"></div>
    <div id="div4" class="box"></div>
    <div id="div5" class="box"></div>
    <div id="div6" class="box"></div>

    <script>
        let siviPozicijaLeft = 0;

        function pomakni(korak) {
            siviPozicijaLeft += korak;
            document.getElementById('div6').style.left = siviPozicijaLeft + 'px';
        }
    </script>

</body>
</html>
