<HTML>
<HEAD>
<TITLE>Jednostavni Rollover</TITLE>

<SCRIPT LANGUAGE="JavaScript">
var zaloadslika = new Image();
zaloadslika.src = "blue.png";
</SCRIPT>

</HEAD>

<BODY>
<A HREF="#"
onMouseOver="window.document.mojaslika.src=zaloadslika.src;"
onMouseOut="window.document.mojaslika.src='red.png';">
<img src="red.png" name="mojaslika" width="100" height="100" border="0"> 
</A>
</BODY>
</HTML>
